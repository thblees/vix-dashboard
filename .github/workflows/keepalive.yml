name: Keep Alive

on:
  schedule:
    - cron: '0 10 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Keep-alive Commit
        run: |
          git config user.name "VIX-Bot"
          git config user.email "vix-bot@meine-geldseite.de"
          git commit --allow-empty -m "keepalive: $(date -u '+%Y-%m-%d')"
          git push
